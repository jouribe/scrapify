services:
  db:
    image: postgres:16-alpine
    container_name: scrapyfy-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-scrapify}
    ports:
      - '${POSTGRES_PORT:-5434}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scrapify}']
      interval: 5s
      timeout: 5s
      retries: 10

  scrapyfy:
    build:
      context: .
      dockerfile: Dockerfile
    image: scrapyfy:latest
    container_name: scrapyfy-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./inputs:/app/inputs
      - ./external:/app/external
      - ./exports:/app/exports
      - ./logs:/app/logs
    command: ['--help']

volumes:
  postgres_data:
